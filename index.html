<script>
        const button = document.getElementById("trigger");
        let inputs = document.querySelectorAll("#input1, #input2, #input3, #input4, #input5, #input6, #input7, #input8, #input9, #input10");
        const array = Array.from(inputs);
        /*const reversed = array.toReversed();*/

        function fun() {
        let enter = prompt("Enter Habit");
        if (enter) {
            for (let input of inputs) {
                if (input.value === "Enter Habit") {
                    input.value = enter;
                    break;
            }
        }
    }
}

        function del() {
            for (let i = inputs.length - 1; i >= 0; i--) {
                let input = inputs[i];
                if (input.value && input.value !== "Enter Habit") {
                    input.value = "Enter Habit";
                return;
                    
            }
                
        }
    }
           
        /* date */
    const month = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    function time() {
    const d = new Date();
    let name = month[d.getMonth()];
    let day = d.getDate();
        return name + " " + day + "th";
    };
    document.getElementById("date").innerHTML = time();


</script>
